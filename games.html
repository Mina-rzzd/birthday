<style>
    body {

        background: #f5f5f5;

    }

    .top-buttons {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        display: flex;
        gap: 10px;
        z-index: 9999;
        width: 20%;
    }

    .top-buttons button {
        padding: 10px 16px;
        border: none;
        border-radius: 999px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,.2);
    }

    .top-buttons button:hover {
        background: #f57c00;
    }

    .grid {
        display: grid;
        grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px
    }

    .card {
        background: #fff;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 2px 8px #0002
    }

    button {
        width: 100%;
        padding: 10px
    }
</style>
